<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinderPicture - Bàn giao & Chọn Ảnh</title>
    <style>
        :root { --bg-dark: #09090b; --bg-card: #18181b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #3b82f6; --accent-hover: #2563eb; --success: #10b981; --danger: #ef4444; --border: #27272a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); padding-bottom: 60px; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        header { background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .brand-title { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.5px; text-transform: uppercase; }
        .brand-subtitle { font-size: 12px; font-weight: 500; color: var(--success); letter-spacing: 2px; text-transform: uppercase; }
        
        .filter-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tab-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 18px; font-size: 13px; font-weight: 600; border-radius: 30px; cursor: pointer; transition: all 0.3s; }
        .tab-btn:hover { background: #27272a; color: #fff; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .counter { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-left: 6px; }
        
        .header-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 5px; width: 100%;}
        .btn-download-batch { background: var(--success); border: none; color: white; padding: 10px 24px; font-size: 14px; font-weight: 600; border-radius: 30px; cursor: pointer; transition: all 0.2s; display: none; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .btn-download-batch:hover { background: #059669; transform: translateY(-1px); }
        .btn-finalize { background: var(--accent); border: none; color: white; padding: 10px 24px; font-size: 14px; font-weight: 600; border-radius: 30px; cursor: pointer; transition: all 0.2s; display: none; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .btn-finalize:hover { background: var(--accent-hover); transform: translateY(-1px); }

        .finalized-banner { display: none; width: 100%; background: linear-gradient(90deg, #8b5cf6, #6d28d9); color: white; text-align: center; padding: 12px; font-size: 14px; font-weight: bold; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }

        .gallery-container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        .photo-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; flex-direction: column; }
        .photo-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.4); border-color: #3f3f46; }
        
        .image-container { position: relative; width: 100%; height: 220px; background: #000; cursor: pointer; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; transition: opacity 0.3s
            :root { --bg-dark: #09090b; --bg-card: #18181b; --text-main: #f8fafc; --accent: #3b82f6; }
        body { background: var(--bg-dark); color: var(--text-main); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; padding: 20px; }
        .photo-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        .image-container img { width: 100%; height: 250px; object-fit: cover; }
    </style>
</head>
<body>
    <header>
        <div class="brand-title">FINDERPICTURE</div>
    </header>

    <div class="gallery-container">
        <div class="gallery-grid" id="gallery">
            <p style="text-align:center;">⏳ Đang tải ảnh từ Server...</p>
        </div>
    </div>

    <script>
        // CẤU HÌNH ĐỊA CHỈ SERVER CỦA BẠN TẠI ĐÂY
        const ONLINE_SERVER = 'https://finder-swart-pi.vercel.app';
        const urlParams = new URLSearchParams(window.location.search);
        const folderId = urlParams.get('id');

        async function loadGallery() {
            try {
                const response = await fetch(`${ONLINE_SERVER}/api/album/${folderId}`);
                const data = await response.json();
                
                if (data.success) {
                    const gallery = document.getElementById('gallery');
                    gallery.innerHTML = '';
                    data.files.forEach(file => {
                        gallery.innerHTML += `
                            <div class="photo-card">
                                <div class="image-container">
                                    <img src="${file.thumbnail}" alt="${file.shortName}">
                                </div>
                                <div style="padding:10px;">${file.shortName}</div>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                document.getElementById('gallery').innerHTML = "❌ Không thể kết nối tới Server.";
            }
        }

        loadGallery();
    </script>
</body>
</html>
