<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinderPicture - Bàn giao & Chọn Ảnh</title>
    <style>
        :root { --bg-dark: #09090b; --bg-card: #18181b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #3b82f6; --success: #10b981; --border: #27272a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); padding-bottom: 60px; user-select: none; }
        
        header { background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(12px); padding: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .brand-title { font-size: 20px; font-weight: 700; color: #fff; text-transform: uppercase; }
        
        .gallery-container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        
        .photo-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
        .image-container { position: relative; width: 100%; height: 250px; background: #000; overflow: hidden; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .finalized-banner { display: none; width: 100%; background: linear-gradient(90deg, #8b5cf6, #6d28d9); color: white; text-align: center; padding: 12px; font-weight: bold; }
        .message-box { text-align: center; grid-column: 1 / -1; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div id="finalizedBanner" class="finalized-banner">ALBUM ĐÃ ĐƯỢC CHỐT - KHÔNG THỂ THAY ĐỔI</div>
    
    <header>
        <div class="brand-title">FINDERPICTURE</div>
    </header>

    <div class="gallery-container">
        <div class="gallery-grid" id="gallery">
            <div class="message-box">⏳ Đang tải ảnh từ Server...</div>
        </div>
    </div>

    <script>
        const ONLINE_SERVER = 'https://finder-swart-pi.vercel.app';
        const urlParams = new URLSearchParams(window.location.search);
        const folderId = urlParams.get('id');

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            try {
                const response = await fetch(`${ONLINE_SERVER}/api/album/${folderId}`);
                const data = await response.json();
                
                if (data.success) {
                    if (data.isFinalized) document.getElementById('finalizedBanner').style.display = 'block';
                    
                    gallery.innerHTML = '';
                    data.files.forEach(file => {
                        // FIX: Kiểm tra nếu link thumbnail là link avatar mặc định của google, ép lấy originalUrl
                        const isGoogleAvatar = file.thumbnail && file.thumbnail.includes('googleusercontent.com/profile');
                        const imgUrl = isGoogleAvatar ? file.originalUrl : file.thumbnail;
                        
                        gallery.innerHTML += `
                            <div class="photo-card">
                                <div class="image-container">
                                    <img src="${imgUrl}" alt="${file.shortName}" loading="lazy">
                                </div>
                                <div style="padding:12px; text-align: center; font-size: 14px;">${file.shortName}</div>
                            </div>
                        `;
                    });
                } else {
                    gallery.innerHTML = `<div class="message-box" style="color: #ef4444;">❌ Lỗi: ${data.error || "Không thể lấy dữ liệu"}</div>`;
                }
            } catch (e) {
                gallery.innerHTML = `<div class="message-box" style="color: #ef4444;">❌ Không thể kết nối tới Server.</div>`;
            }
        }

        if (folderId) {
            loadGallery();
        } else {
            document.getElementById('gallery').innerHTML = `<div class="message-box">❌ ID Album không hợp lệ.</div>`;
        }
    </script>
</body>
</html>
