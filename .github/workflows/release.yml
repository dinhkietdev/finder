name: Release Finder

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'desk/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desk/package-lock.json
      - run: npm ci
      - name: Configure Firebase Authentication
        run: |
          node -e "require('fs').writeFileSync('firebase-auth-config.js', 'module.exports = { apiKey: ' + JSON.stringify(process.env.FIREBASE_WEB_API_KEY) + ' };\n')"
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
      - name: Set release version
        run: node -e "const fs=require('fs'); const p=require('./package.json'); p.version='1.0.${{ github.run_number }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');"
      - name: Create release tag
        run: |
          TAG="v1.0.${{ github.run_number }}"
          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Finder $TAG"
            git push origin "$TAG"
          fi
      # Package first, then upload with the GitHub CLI.  electron-builder
      # uploads the artifact and its blockmap concurrently, which can leave a
      # release with only the first asset.
      - name: Build macOS installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish never
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v1.0.${{ github.run_number }}
        run: gh release create "$TAG" --title "Finder $TAG" --generate-notes || true
      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v1.0.${{ github.run_number }}
        run: gh release upload "$TAG" dist/*.zip dist/*.dmg dist/*.blockmap dist/latest-mac.yml --clobber

  build-windows:
    needs: build-macos
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desk/package-lock.json
      - run: npm ci
      - name: Configure Firebase Authentication
        run: |
          node -e "require('fs').writeFileSync('firebase-auth-config.js', 'module.exports = { apiKey: ' + JSON.stringify(process.env.FIREBASE_WEB_API_KEY) + ' };\n')"
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
      - name: Set release version
        run: node -e "const fs=require('fs'); const p=require('./package.json'); p.version='1.0.${{ github.run_number }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');"
      # Upload Windows assets after packaging.  Publishing the installer and
      # its blockmap in parallel can make GitHub keep only one of them.
      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish never
      - name: Upload Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v1.0.${{ github.run_number }}
        run: gh release upload $env:TAG dist/*.exe dist/*.blockmap dist/latest.yml --clobber
