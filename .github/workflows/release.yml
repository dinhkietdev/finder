name: Release Finder

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finder-release-${{ github.ref }}
  cancel-in-progress: false

env:
  TAG: v1.0.${{ github.run_number }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install server dependencies
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Syntax and API smoke tests
        run: npm test
      - name: Create release tag and draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Finder $TAG"
            git push origin "$TAG"
          fi
          cat > release-notes.md <<'EOF'
          ## Finder desktop

          macOS: kéo Finder vào Applications. Nếu Gatekeeper cảnh báo app chưa notarize, Control-click → Open.
          Windows: chạy DK-Workflow-Setup-*.exe.

          Bản phát hành có kiểm tra API smoke trước khi đóng gói. Ảnh Drive dùng proxy thumbnail riêng tư; không cấp quyền anyone/reader.
          EOF
          gh release create "$TAG" --title "Finder $TAG" --notes-file release-notes.md --draft || true

  build-macos:
    needs: preflight
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desk/package-lock.json
      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Configure Firebase Authentication
        run: |
          node -e "require('fs').writeFileSync('firebase-auth-config.js', 'module.exports = { apiKey: ' + JSON.stringify(process.env.FIREBASE_WEB_API_KEY) + ' };\n')"
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
      - name: Configure Desktop OAuth
        run: |
          printf '%s' "$DESKTOP_OAUTH_CREDENTIALS" > oauth-desktop-credentials.json
          node -e "JSON.parse(require('fs').readFileSync('oauth-desktop-credentials.json','utf8')); console.log('Desktop OAuth JSON valid')"
        env:
          DESKTOP_OAUTH_CREDENTIALS: ${{ secrets.DESKTOP_OAUTH_CREDENTIALS }}
      - name: Set release version
        run: node -e "const fs=require('fs'); const p=require('./package.json'); p.version='1.0.${{ github.run_number }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');"
      - name: Build macOS installers
        run: npx electron-builder --mac --publish never
      - name: Upload macOS assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" dist/*.zip dist/*.dmg dist/*.blockmap dist/latest-mac.yml --clobber

  build-windows:
    needs: preflight
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desk/package-lock.json
      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Configure Firebase Authentication
        run: |
          node -e "require('fs').writeFileSync('firebase-auth-config.js', 'module.exports = { apiKey: ' + JSON.stringify(process.env.FIREBASE_WEB_API_KEY) + ' };\n')"
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
      - name: Configure Desktop OAuth
        shell: pwsh
        run: |
          Set-Content -Path oauth-desktop-credentials.json -Value $env:DESKTOP_OAUTH_CREDENTIALS -NoNewline
          node -e "JSON.parse(require('fs').readFileSync('oauth-desktop-credentials.json','utf8')); console.log('Desktop OAuth JSON valid')"
        env:
          DESKTOP_OAUTH_CREDENTIALS: ${{ secrets.DESKTOP_OAUTH_CREDENTIALS }}
      - name: Set release version
        run: node -e "const fs=require('fs'); const p=require('./package.json'); p.version='1.0.${{ github.run_number }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');"
      - name: Build Windows installer
        run: npx electron-builder --win --publish never
      - name: Upload Windows assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = @(
            Get-ChildItem -Path dist -Filter '*.exe' -File
            Get-ChildItem -Path dist -Filter '*.blockmap' -File
            Get-ChildItem -Path dist -Filter 'latest.yml' -File
          ) | Select-Object -ExpandProperty FullName
          if (-not $assets) { throw 'No Windows release assets were produced.' }
          gh release upload "$env:TAG" $assets --clobber

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
